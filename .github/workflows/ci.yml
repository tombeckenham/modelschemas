name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun --bun run check

      - name: Lint
        run: bun --bun run lint

      - name: Typecheck
        run: bun run typecheck

      # Plain `bun run` (no --bun): vitest must run under node — bun's ws shim
      # lacks the 'upgrade' event the cloudflare workers pool needs.
      - name: Test
        run: bun run test

      - name: Build
        run: bun --bun run build
